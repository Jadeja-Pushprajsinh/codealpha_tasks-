{% extends 'base.html' %}

{% block content %}

<div class="product-container">

<div class="product-card">

    <img src="{{ product.image }}">

    <h1>{{ product.name }}</h1>

    <p>{{ product.description }}</p>

    <h2>₹ {{ product.price }}</h2>

    <a class="btn"
       href="{% url 'add_to_cart' product.id %}">
       Add To Cart
    </a>

</div>

</div>

{% endblock %}
