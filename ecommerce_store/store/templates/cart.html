{% extends 'base.html' %}

{% block content %}

<h1 class="title">Your Cart</h1>

<div class="cart-container">

    {% for item in items %}

    <div class="cart-card">

        <img src="{{ item.product.image }}">
        <div class="cart-details">

            <h2>{{ item.product.name }}</h2>

            <p>Quantity: {{ item.quantity }}</p>

            <p>Price: ${{ item.product.price }}</p>

        </div>

    </div>

    {% endfor %}

</div>

<div class="total-box">

    <h2>Total: ${{ total }}</h2>

    <a class="btn"
       href="{% url 'checkout' %}">
       Proceed To Checkout
    </a>

</div>

{% endblock %}
