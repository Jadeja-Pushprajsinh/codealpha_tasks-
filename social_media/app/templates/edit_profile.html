{% extends 'base.html' %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1>Edit Profile</h1>

        <form method="POST">

            {% csrf_token %}

            <!-- BIO -->

            <label>Bio</label>

            <textarea
                name="bio">

                {{ profile.bio }}

            </textarea>

            <!-- IMAGE -->

            <label>Profile Image URL</label>

            <input type="text"
                   name="profile_image"
                   value="{{ profile.profile_image }}">

            <button class="auth-btn"
                    type="submit">

                Save Changes

            </button>

        </form>

    </div>

</div>

{% endblock %}
