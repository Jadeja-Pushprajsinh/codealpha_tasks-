{% extends 'base.html' %}

{% block content %}

<div class="auth-page">

    <div class="auth-box">

        <h1>

            Welcome Back

        </h1>

        <p>

            Login to continue managing projects

        </p>

        <form method="POST">

            {% csrf_token %}

            {{ form.username }}

            {{ form.password }}

            <button type="submit">

                Login

            </button>

        </form>

        <div class="auth-bottom">

            Don't have an account?

            <a href="/register">

                Register

            </a>

        </div>

    </div>

</div>

{% endblock %}
